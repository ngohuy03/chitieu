<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Expense Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <div class="container">
        <header>
            <div>
                <h1>Quản Lý Chi Tiêu Nhóm</h1>
                <div class="nav-links">
                    <a href="/" class="nav-link active">Chi Tiêu</a>
                    <a href="/settlements.html" class="nav-link">Thành Tiền</a>
                    <a href="/groups.html" class="nav-link">Quỹ Nhóm</a>
                    <a href="/users.html" class="nav-link">Người Dùng</a>
                </div>
            </div>
            <button class="btn" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> Thêm Chi Tiêu
            </button>
        </header>

        <div class="grid">
            <!-- Category / Sidebar -->
            <div class="sidebar">
                <h2>Nhóm của bạn</h2>
                <ul class="category-list" id="groupList">
                    <!-- Groups will be loaded here -->
                    <li class="category-item active">Đang tải...</li>
                </ul>
            </div>

            <!-- Main Content / Table -->
            <div class="main-content">
                <div class="section-header">
                    <h2>Danh Sách Chi Tiêu</h2>
                    <input type="date" id="expenseDate" onchange="loadExpenses()">
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Tiêu đề</th>
                                <th>Người trả</th>
                                <th>Số tiền</th>
                                <th>Chi tiết chia</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="expenseTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-muted);">Đang tải dữ
                                    liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal" id="expenseModal">
        <div class="modal-content">
            <h2 style="margin-top: 0;">Thêm Chi Tiêu Mới</h2>
            <div class="form-group">
                <label>Người trả</label>
                <select id="paidBy">
                    <option value="">Chọn người trả</option>
                    <!-- Users will be loaded here -->
                </select>
            </div>
            
            <div class="form-group">
                <label>Danh sách đồ</label>
                <div id="itemsList" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 10px; max-height: 150px; overflow-y: auto;">
                    <span style="color: var(--text-muted);">Chưa có món nào được thêm.</span>
                </div>
                <button class="btn" style="width: 100%; justify-content: center;" onclick="showAddItemForm()">
                    <i class="fa-solid fa-plus"></i> Thêm đồ
                </button>
            </div>

            <!-- Form nhỏ để thêm đồ -->
            <div id="addItemForm" style="display: none; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px;">
                <div class="form-group">
                    <label>Tên đồ</label>
                    <input type="text" id="itemName" placeholder="Ví dụ: Thịt bò">
                </div>
                <div class="form-group">
                    <label>Giá đồ</label>
                    <input type="number" id="itemPrice" placeholder="0">
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <label style="margin: 0;">Người tham gia</label>
                        <button class="btn" style="padding: 2px 8px; font-size: 0.8rem; background: rgba(255,255,255,0.1);" onclick="selectAllItemParticipants()">Tích hết</button>
                    </div>
                    <div class="checkbox-group" id="itemParticipantsList">
                        <!-- Checkboxes will be loaded here -->
                    </div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);" onclick="hideAddItemForm()">Hủy</button>
                    <button class="btn" onclick="addItem()">Xác nhận</button>
                </div>
            </div>

            <div class="form-group">
                <label>Tổng cộng: <span id="totalAmount" style="font-weight: 700; color: #10b981;">0 đ</span></label>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);"
                    onclick="closeModal()">Hủy</button>
                <button class="btn" onclick="saveExpense()">Lưu</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
