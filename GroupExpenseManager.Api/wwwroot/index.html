<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Expense Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text);
        }

        .grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        /* Category / Sidebar */
        .sidebar {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-top: 0;
            color: var(--text-muted);
            font-weight: 600;
        }

        .category-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .category-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .category-item:hover,
        .category-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .category-item.active {
            border-left: 4px solid var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        /* Main Content / Table */
        .main-content {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 12px 16px;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .amount {
            font-weight: 700;
            color: #10b981;
        }

        .chip {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Modal / Form */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            border: 1px solid var(--glass-border);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 120px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-item input {
            width: auto;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div>
                <h1>Quản Lý Chi Tiêu Nhóm</h1>
                <div class="nav-links">
                    <a href="/" class="nav-link active">Chi Tiêu</a>
                    <a href="/settlements.html" class="nav-link">Thành Tiền</a>
                    <a href="/groups.html" class="nav-link">Quỹ Nhóm</a>
                    <a href="/users.html" class="nav-link">Người Dùng</a>
                </div>
            </div>
            <button class="btn" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> Thêm Chi Tiêu
            </button>
        </header>

        <div class="grid">
            <!-- Category / Sidebar -->
            <div class="sidebar">
                <h2>Nhóm của bạn</h2>
                <ul class="category-list" id="groupList">
                    <!-- Groups will be loaded here -->
                    <li class="category-item active">Đang tải...</li>
                </ul>
            </div>

            <!-- Main Content / Table -->
            <div class="main-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0; font-size: 1.3rem;">Danh Sách Chi Tiêu</h2>
                    <input type="date" id="expenseDate" style="width: auto;" onchange="loadExpenses()">
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Tiêu đề</th>
                                <th>Người trả</th>
                                <th>Số tiền</th>
                                <th>Chi tiết chia</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="expenseTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-muted);">Đang tải dữ
                                    liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal" id="expenseModal">
        <div class="modal-content">
            <h2 style="margin-top: 0;">Thêm Chi Tiêu Mới</h2>
            <div class="form-group">
                <label>Người trả</label>
                <select id="paidBy">
                    <option value="">Chọn người trả</option>
                    <!-- Users will be loaded here -->
                </select>
            </div>
            
            <div class="form-group">
                <label>Danh sách đồ</label>
                <div id="itemsList" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 10px; max-height: 150px; overflow-y: auto;">
                    <span style="color: var(--text-muted);">Chưa có món nào được thêm.</span>
                </div>
                <button class="btn" style="width: 100%; justify-content: center;" onclick="showAddItemForm()">
                    <i class="fa-solid fa-plus"></i> Thêm đồ
                </button>
            </div>

            <!-- Form nhỏ để thêm đồ -->
            <div id="addItemForm" style="display: none; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px;">
                <div class="form-group">
                    <label>Tên đồ</label>
                    <input type="text" id="itemName" placeholder="Ví dụ: Thịt bò">
                </div>
                <div class="form-group">
                    <label>Giá đồ</label>
                    <input type="number" id="itemPrice" placeholder="0">
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <label style="margin: 0;">Người tham gia</label>
                        <button class="btn" style="padding: 2px 8px; font-size: 0.8rem; background: rgba(255,255,255,0.1);" onclick="selectAllItemParticipants()">Tích hết</button>
                    </div>
                    <div class="checkbox-group" id="itemParticipantsList">
                        <!-- Checkboxes will be loaded here -->
                    </div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);" onclick="hideAddItemForm()">Hủy</button>
                    <button class="btn" onclick="addItem()">Xác nhận</button>
                </div>
            </div>

            <div class="form-group">
                <label>Tổng cộng: <span id="totalAmount" style="font-weight: 700; color: #10b981;">0 đ</span></label>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);"
                    onclick="closeModal()">Hủy</button>
                <button class="btn" onclick="saveExpense()">Lưu</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
