<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thành Tiền (Quyết Toán) - Group Expense Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text);
        }

        .main-content {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .settlement-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .settlement-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .settlement-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .user-names {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }

        .debtor {
            color: #ef4444;
            font-weight: 700;
        }

        .creditor {
            color: #10b981;
            font-weight: 700;
        }

        .amount {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fb923c;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div>
                <h1>Quyết Toán (Thành Tiền)</h1>
                <div class="nav-links">
                    <a href="/" class="nav-link">Chi Tiêu</a>
                    <a href="/settlements.html" class="nav-link active">Thành Tiền</a>
                    <a href="/groups.html" class="nav-link">Quỹ Nhóm</a>
                    <a href="/users.html" class="nav-link">Người Dùng</a>
                </div>
            </div>
            <div>
                <select id="groupSelect" onchange="loadSettlements()">
                    <option value="">Chọn Nhóm</option>
                    <!-- Groups will be loaded here -->
                </select>
            </div>
        </header>

        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 1.3rem; color: var(--text-muted);">Thành tiền</h2>
                <button class="btn" style="background: #10b981; padding: 8px 16px; font-size: 0.9rem;" onclick="settleAll()">
                    <i class="fa-solid fa-broom"></i> Thanh toán & Lưu trữ
                </button>
            </div>

            <div class="settlement-list" id="settlementList">
                <div style="text-align: center; color: var(--text-muted); padding: 20px;">Vui lòng chọn nhóm để xem
                    quyết toán.</div>
            </div>
        </div>
    </div>

    <script src="/js/settlements.js?v=2"></script>
</body>

</html>
