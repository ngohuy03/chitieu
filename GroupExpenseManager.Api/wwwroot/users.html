<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Người Dùng - Group Expense Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>Quản Lý Người Dùng</h1>
                <div class="nav-links" style="margin-top: 10px;">
                    <a href="/" class="nav-link">Chi Tiêu</a>
                    <a href="/settlements.html" class="nav-link">Thành Tiền</a>
                    <a href="/groups.html" class="nav-link">Quỹ Nhóm</a>
                    <a href="/users.html" class="nav-link active">Người Dùng</a>
                </div>
            </div>
            <button class="btn" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> Thêm Người Dùng
            </button>
        </header>

        <div class="main-content">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Tên</th>
                            <th>Số điện thoại</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="3" style="text-align: center; color: var(--text-muted);">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top: 0;">Thêm Người Dùng Mới</h2>
            <input type="hidden" id="userId">
            <div class="form-group">
                <label>Tên</label>
                <input type="text" id="userName" placeholder="Ví dụ: Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" id="userPhone" placeholder="0912xxxxxx (Tùy chọn)">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);" onclick="closeModal()">Hủy</button>
                <button class="btn" onclick="saveUser()">Lưu</button>
            </div>
        </div>
    </div>

    <script src="/js/users.js"></script>
</body>
</html>
