<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Quỹ Nhóm - Group Expense Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text);
        }

        .main-content {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 12px 16px;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .amount {
            font-weight: 700;
            color: #10b981;
        }

        /* Modal / Form */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            border: 1px solid var(--glass-border);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>Quản Lý Quỹ Nhóm</h1>
                <div class="nav-links" style="margin-top: 10px;">
                    <a href="/" class="nav-link">Chi Tiêu</a>
                    <a href="/settlements.html" class="nav-link">Thành Tiền</a>
                    <a href="/groups.html" class="nav-link active">Quỹ Nhóm</a>
                    <a href="/users.html" class="nav-link">Người Dùng</a>
                </div>
            </div>
            <button class="btn" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> Thêm Nhóm
            </button>
        </header>

        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 1.3rem;">Danh Sách Quỹ Nhóm</h2>
                <input type="text" id="searchInput" placeholder="Tìm kiếm nhóm..." style="width: auto;" oninput="loadGroups()">
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Mã</th>
                            <th>Tên</th>
                            <th>Số tiền quỹ</th>
                            <th>Người đóng góp</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="groupTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-muted);">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal" id="groupModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top: 0;">Thêm Nhóm Mới</h2>
            <input type="hidden" id="groupId">
            <div class="form-group">
                <label>Mã Nhóm</label>
                <input type="text" id="groupCode" placeholder="Ví dụ: NHOM_01">
            </div>
            <div class="form-group">
                <label>Tên Nhóm</label>
                <input type="text" id="groupName" placeholder="Ví dụ: Gia Đình">
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <input type="text" id="groupDescription" placeholder="Mô tả ngắn gọn">
            </div>
            <div class="form-group">
                <label>Số tiền quỹ</label>
                <input type="number" id="groupAmount" placeholder="0">
            </div>
            <div class="form-group">
                <label>Người đóng góp</label>
                <select id="contributorId">
                    <option value="">Chọn người đóng góp</option>
                    <!-- Users will be loaded here -->
                </select>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);" onclick="closeModal()">Hủy</button>
                <button class="btn" onclick="saveGroup()">Lưu</button>
            </div>
        </div>
    </div>

    <script src="/js/groups.js"></script>
</body>
</html>
